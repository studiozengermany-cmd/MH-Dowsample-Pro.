name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: python -m pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m playwright install --with-deps chromium
      - run: python -m pytest tests -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=68
      - run: python -m ruff check .
      - run: python -m mypy config.py exceptions.py quality_gate.py processor.py organizer.py organize.py crawler.py bot.py utils tools --ignore-missing-imports
      - run: python -m bandit -r . -x tests,tools -ll
      - run: python -c "from utils.db import DatabasePool; from organizer import Organizer; from crawler import AudioCrawler"
